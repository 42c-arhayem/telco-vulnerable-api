# GitLab CI/CD configuration for 42Crunch Telco Vulnerable API Security Testing
#
# This pipeline performs API Security Audit and Conformance Scan for the Telco API
# using 42Crunch platform and tools.

stages:
  - audit
  - test

variables:
  PLATFORM_URL: "https://demolabs.42crunch.cloud"
  PLATFORM_SERVICE: "services.demolabs.42crunch.cloud:8001"
  API_URL: "https://cute-noble-boar.ngrok-free.app"
  CONFIG_NAME: "base_config"
  # Set X42C_API_TOKEN in GitLab > Project > Settings > CI/CD > Variables (masked/protected)

42c-audit:       # 42Crunch API Discovery and Audit job
  stage: audit
  image:
    name: 42crunch/gitlab-api-security-audit:v4
  before_script:
    - apk add --no-cache jq  # Install jq since it's not in the image
  only:
    refs:
      - main
      - merge_requests
  variables:
    X42C_PLATFORM_URL: $PLATFORM_URL
    X42C_JSON_REPORT: audit-action-report-$CI_PIPELINE_ID.json
    X42C_LOG_LEVEL: DEBUG
    X42C_IGNORE_FAILURES: true
    X42C_API_TAGS: "ApiType:Telecom"
  script: 
    - /audit/audit.sh
    - echo "Audit JSON Report:" && cat $X42C_JSON_REPORT
    # Extract API UUIDs for both protection and scan APIs
    - API_PROTECTION_UUID=$(cat ./audit-action-report-$CI_PIPELINE_ID.json | jq -r '.audit.report."rest-api/openapi/telco-openapi-protection.json".apiId')
    - API_SCAN_UUID=$(cat ./audit-action-report-$CI_PIPELINE_ID.json | jq -r '.audit.report."rest-api/openapi/telco-openapi-remediated.json".apiId')
    - echo "API Protection UUID:" $API_PROTECTION_UUID
    - echo "API Scan UUID:" $API_SCAN_UUID
  artifacts:
    paths:
      - audit-action-report-$CI_PIPELINE_ID.json # Save the audit report as an artifact, used in the next job (42c-scan)
    expire_in: "1 week"

42c-scan:       # 42Crunch API Conformance Scan job
  stage: test
  image: ubuntu:20.04
  services:
    - name: docker:25-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  dependencies:
    - 42c-audit
  before_script:
    # Install Docker and other required packages
    - apt-get update && apt-get install -y python3 python3-pip python3-venv curl jq wget apt-transport-https ca-certificates gnupg lsb-release
    - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
    - apt-get update && apt-get install -y docker-ce-cli
    - wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
    - chmod +x /usr/local/bin/yq
  script:
    # Create a virtual environment for python
    - python3 -m venv my-venv
    - my-venv/bin/pip3 install requests
    
    # Get the 42Crunch API UUID from the 42c-audit job's report
    - API_SCAN_UUID=$(cat ./audit-action-report-$CI_PIPELINE_ID.json | jq -r '.audit.report."rest-api/openapi/telco-openapi-remediated.json".apiId')
    - echo "API Scan UUID:" $API_SCAN_UUID
    
    # Retrieve the Alias of the target API from the .42c/conf.yaml file
    - API_ALIAS_ID=$(cat ./.42c/conf.yaml | yq '.apis."rest-api/openapi/telco-openapi-remediated.json".alias')
    - echo "API Alias ID:" $API_ALIAS_ID
    
    # Generate a scan v2 configuration from existing scanconf.json file
    - my-venv/bin/python3 scripts/conformance_scanv2.py -c $X42C_API_TOKEN -p $PLATFORM_URL -a $API_SCAN_UUID -n $CONFIG_NAME -t scan_token.json -f .42c/scan/$API_ALIAS_ID/scanconf.json --action upload_conf
    - scan_token=$(cat scan_token.json | jq -r '.scan_token') # Extract the scan token from the response
    - echo "Scan token retrieved successfully"
    
    # Pull the latest 42Crunch ScanD Docker v2 image
    - docker pull 42crunch/scand-agent:v2
    
    # Run the ScanD Docker container passing the scan v2 configuration and the target API endpoint
    - docker run --rm -e SCAN_TOKEN=$scan_token -e SCAN42C_HOST=$API_URL -e PLATFORM_SERVICE=$PLATFORM_SERVICE 42crunch/scand-agent:v2
    
    # List the scan reports for the target API and save the Task ID for the configuration
    # - taskId=$(my-venv/bin/python3 scripts/manage_scanv2_reports.py $X42C_API_TOKEN $API_SCAN_UUID -o list -p $PLATFORM_URL -q | grep $CONFIG_NAME | cut -d',' -f1)
    # - configId=$(my-venv/bin/python3 scripts/manage_scanv2_reports.py $X42C_API_TOKEN $API_SCAN_UUID -o list -p $PLATFORM_URL -q | grep $CONFIG_NAME | cut -d',' -f2)
    
    # Retrieve the scan report for the target API using Task ID
    # - my-venv/bin/python3 scripts/manage_scanv2_reports.py $X42C_API_TOKEN $API_SCAN_UUID -o retrieve -p $PLATFORM_URL -t $taskId
    
    # Print the scan report URL using Scan Config ID
    # - echo "Scan report - $PLATFORM_URL/apis/$API_SCAN_UUID/scan/report?configId=$configId"
    - echo "Scan report - $PLATFORM_URL/apis/$API_SCAN_UUID/scan/"
  artifacts:
    paths:
    #  - scanreport_*.json # Save the 42Crunch Platform Scan reports as an artifact
      - scan_token.json   # Save the scan token for debugging
    expire_in: "1 week"